        // --- State Management ---
        let allData = [];
        let searchQuery = '';
        let selectedSubDistrict = 'ทั้งหมด';

        // --- Functions ---

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const columns = line.split(',');
                
                const subDistrict = columns[0]?.trim();
                const unit = columns[1]?.trim();
                const location = columns[2]?.trim();
                const president = columns[3]?.trim();
                
                const members = [];
                for (let j = 4; j <= 11; j++) {
                    if (columns[j] && columns[j].trim() !== '') {
                        members.push(columns[j].trim());
                    }
                }
                
                // เก็บเป็น Array เพื่อการรันตัวเลข 1., 2.
                const police = [];
                if (columns[12] && columns[12].trim() !== '') police.push(columns[12].trim());
                if (columns[13] && columns[13].trim() !== '') police.push(columns[13].trim());
                
                const mapLink = columns[14]?.trim();
                
                if (unit && subDistrict) {
                    result.push({
                        id: `unit-${subDistrict}-${unit}-${i}`,
                        unit,
                        subDistrict,
                        location,
                        president,
                        members,
                        police,
                        mapLink
                    });
                }
            }
            return result;
        }

        function highlightText(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="bg-yellow-200 text-purple-900 font-semibold px-0.5 rounded">$1</span>');
        }

        function renderFilters() {
            // ดึงชื่อแขวงจากข้อมูล CSV ปกติ
            const subDistricts = ['ทั้งหมด', ...new Set(allData.map(d => d.subDistrict))];
            
            // เพิ่ม "ตำรวจประจำเขต" เข้าไปเป็นแท็บสุดท้าย
            const tabs = [...subDistricts, 'จนท.ตำรวจประจำเขต'];

            const container = document.getElementById('filterContainer');
            container.innerHTML = `<i data-lucide="filter" class="text-purple-400 flex-shrink-0 w-4 h-4 mr-2"></i>`;
            
            tabs.forEach(tabName => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border ${
                    selectedSubDistrict === tabName
                        ? 'bg-purple-600 text-white border-purple-600 shadow-md shadow-purple-200'
                        : 'bg-white text-gray-600 border-gray-200 hover:border-purple-300 hover:text-purple-600 hover:bg-purple-50'
                }`;
                
                // ถ้าเป็นแท็บตำรวจ อาจจะให้สีพิเศษนิดหน่อยเวลาไม่ได้ถูกเลือก
                if (tabName === 'จนท.ตำรวจประจำเขต' && selectedSubDistrict !== tabName) {
                    btn.className = `px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border bg-blue-50/50 text-blue-700 border-blue-200 hover:border-blue-400 hover:text-blue-800 hover:bg-blue-100`;
                } else if (tabName === 'จนท.ตำรวจประจำเขต' && selectedSubDistrict === tabName) {
                    btn.className = `px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-200`;
                }

                btn.textContent = tabName;
                btn.onclick = () => {
                    selectedSubDistrict = tabName;
                    renderFilters();
                    renderCards();
                };
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            const noResults = document.getElementById('noResults');
            const resultCount = document.getElementById('resultCount');

            // กรณีคลิกแท็บตำรวจประจำเขต
            if (selectedSubDistrict === 'จนท.ตำรวจประจำเขต') {
                const filteredPolice = policeTeamData.filter(p => 
                    p.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                    p.position.toLowerCase().includes(searchQuery.toLowerCase()) || 
                    p.role.toLowerCase().includes(searchQuery.toLowerCase())
                );

                resultCount.innerHTML = `พบเจ้าหน้าที่จำนวน <span class="font-bold text-blue-600">${filteredPolice.length}</span> นาย`;

                if (filteredPolice.length === 0) {
                    container.innerHTML = '';
                    noResults.classList.remove('hidden');
                } else {
                    noResults.classList.add('hidden');
                    container.innerHTML = createPoliceCardHTML(filteredPolice);
                }
            } 
            // กรณีคลิกแท็บปกติ (ข้อมูล กปน.)
            else {
                const filtered = allData.filter(item => {
                    const matchesSearch = 
                        item.location.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.president.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.members.some(m => m.toLowerCase().includes(searchQuery.toLowerCase())) ||
                        (item.police && item.police.some(p => p.toLowerCase().includes(searchQuery.toLowerCase()))) ||
                        item.unit.toString().includes(searchQuery);
                    
                    const matchesFilter = selectedSubDistrict === 'ทั้งหมด' || item.subDistrict === selectedSubDistrict;
                    return matchesSearch && matchesFilter;
                });

                resultCount.innerHTML = `พบข้อมูลจำนวน <span class="font-bold text-purple-600">${filtered.length}</span> หน่วย`;

                if (filtered.length === 0) {
                    container.innerHTML = '';
                    noResults.classList.remove('hidden');
                } else {
                    noResults.classList.add('hidden');
                    container.innerHTML = filtered.map(item => createCardHTML(item)).join('');
                }
            }
            
            // เพิ่ม Event Listner ให้กับการ์ดข้อมูลปกติ
            if (selectedSubDistrict !== 'จนท.ตำรวจประจำเขต') {
                document.querySelectorAll('.card-item').forEach(card => {
                    card.addEventListener('click', () => openModal(card.dataset.id));
                });
            }

            lucide.createIcons();
        }

        // ฟังก์ชันสร้างหน้าการ์ดสำหรับตำรวจประจำเขต
        function createPoliceCardHTML(policeList) {
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">';
            
            policeList.forEach((p, idx) => {
                const isHead = p.role === "หัวหน้าชุด";
                const icon = isHead ? "star" : "shield-check";
                const badgeColor = isHead ? "bg-amber-100 text-amber-600" : "bg-blue-100 text-blue-600";
                const textColor = isHead ? "text-amber-600" : "text-blue-500";
                const borderColor = isHead ? "border-amber-200" : "border-blue-100";
                
                html += `
                <div class="bg-white rounded-2xl shadow-sm border ${borderColor} p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4 hover:shadow-md transition-shadow">
                    <div class="p-3.5 ${badgeColor} rounded-full flex-shrink-0">
                        <i data-lucide="${icon}" class="w-7 h-7"></i>
                    </div>
                    <div>
                        <p class="text-xs ${textColor} font-bold uppercase tracking-wide mb-0.5">${highlightText(p.role, searchQuery)}</p>
                        <p class="font-bold text-gray-900 text-lg mb-1">${highlightText(p.name, searchQuery)}</p>
                        <p class="text-sm text-gray-500 flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i>${highlightText(p.position, searchQuery)}</p>
                    </div>
                </div>`;
            });
            
            html += '</div>';
            return html;
        }

        // ฟังก์ชันสร้างหน้าการ์ดสำหรับกรรมการหน่วย (กปน.)
        function createCardHTML(item) {
            const mapLinkHTML = (item.mapLink && item.mapLink.startsWith('http')) 
                ? `<a href="${item.mapLink}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()" class="flex items-center gap-1 text-xs font-medium text-gray-500 hover:text-purple-600 transition-colors bg-white px-2 py-1 rounded-lg border border-gray-200 hover:border-purple-200 hover:shadow-sm"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> แผนที่</a>` 
                : '';

            // แสดงรายการกรรมการประจำหน่วย
            const membersHTML = item.members.map((member, idx) => `
                <div class="flex items-start gap-2 text-sm text-gray-700 py-1.5 border-b border-gray-50 last:border-0 sm:border-0 hover:bg-purple-50/50 rounded px-1 -mx-1 transition-colors">
                    <span class="text-gray-400 font-mono text-xs w-4 flex-shrink-0 pt-0.5 text-right">${idx + 1}.</span>
                    <span>${highlightText(member, searchQuery)}</span>
                </div>
            `).join('');

            // แสดงรายการตำรวจ รูปแบบเดียวกับกรรมการประจำหน่วย
            const policeListHTML = item.police.map((p, idx) => `
                <div class="flex items-start gap-2 text-sm text-gray-700 py-1.5 border-b border-gray-50 last:border-0 sm:border-0 hover:bg-purple-50/50 rounded px-1 -mx-1 transition-colors">
                    <span class="text-gray-400 font-mono text-xs w-4 flex-shrink-0 pt-0.5 text-right">${idx + 1}.</span>
                    <span>${highlightText(p, searchQuery)}</span>
                </div>
            `).join('');

            const policeHTML = (item.police && item.police.length > 0) ? `
                <div class="mt-6 pt-5 border-t border-purple-100/50">
                    <h4 class="flex items-center gap-2 text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">
                        <i data-lucide="shield" class="w-4 h-4 text-purple-400"></i> เจ้าหน้าที่รักษาความปลอดภัย (${item.police.length})
                    </h4>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-4 gap-y-1">
                        ${policeListHTML}
                    </div>
                </div>` : '';

            return `
            <div data-id="${item.id}" class="card-item bg-white rounded-2xl shadow-sm hover:shadow-md border border-purple-100/50 transition-all duration-300 cursor-pointer group overflow-hidden flex flex-col relative mb-2">
                <div class="p-5 border-b border-purple-50 bg-gradient-to-r from-purple-50/30 to-white">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
                        <div class="flex gap-2">
                            <span class="px-3 py-1 bg-purple-600 text-white text-sm font-bold rounded-full shadow-sm">แขวง${item.subDistrict}</span>
                            <span class="px-3 py-1 bg-white border border-purple-200 text-purple-700 text-sm font-bold rounded-full shadow-sm">หน่วยที่ ${item.unit}</span>
                        </div>
                        ${mapLinkHTML}
                    </div>
                    <h3 class="font-bold text-gray-900 text-xl group-hover:text-purple-700 transition-colors">${highlightText(item.location, searchQuery)}</h3>
                </div>
                <div class="p-5">
                    <div class="mb-6">
                        <div class="flex items-start gap-3 p-4 bg-purple-50 rounded-xl border border-purple-100/50 transition-colors group-hover:bg-purple-100/50">
                            <div class="p-2 bg-white rounded-full shadow-sm flex-shrink-0 text-purple-600">
                                <i data-lucide="user" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-xs text-purple-500 font-bold uppercase tracking-wide mb-1">ประธานหน่วย</p>
                                <p class="font-semibold text-gray-900 text-base">${highlightText(item.president, searchQuery)}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <h4 class="flex items-center gap-2 text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">
                            <i data-lucide="users" class="w-4 h-4 text-purple-400"></i> รายชื่อกรรมการประจำหน่วย (${item.members.length})
                        </h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-4 gap-y-1">
                            ${membersHTML}
                        </div>
                    </div>
                    
                    ${policeHTML}
                </div>
            </div>`;
        }

        function openModal(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;

            const modalBackdrop = document.getElementById('modalBackdrop');
            const modalContent = document.getElementById('modalContent');
            
            // ปรับส่วนเจ้าหน้าที่ตำรวจใน Modal ให้เหมือนกับกรรมการประจำหน่วย
            const policeSection = (item.police && item.police.length > 0) ? `
                <div class="mt-6">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="shield" class="text-purple-400 w-4 h-4"></i>
                        <h3 class="font-semibold text-gray-700 uppercase text-sm tracking-wide">เจ้าหน้าที่รักษาความปลอดภัย (${item.police.length})</h3>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-4 space-y-2 border border-gray-100">
                        ${item.police.map((p, i) => `
                        <div class="flex gap-3 text-sm text-gray-700 border-b border-gray-100 last:border-0 pb-2.5 last:pb-0">
                            <span class="text-gray-400 w-6 font-mono text-xs pt-0.5 text-right">${i + 1}.</span>
                            <span class="font-medium">${p}</span>
                        </div>
                        `).join('')}
                    </div>
                </div>` : '';

            const mapButton = (item.mapLink && item.mapLink.startsWith('http')) ? `
                <a href="${item.mapLink}" target="_blank" rel="noreferrer" class="flex items-center justify-center gap-2 w-full py-3.5 bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-xl transition-all shadow-lg shadow-purple-200 mt-8 hover:shadow-xl hover:-translate-y-0.5">
                    <i data-lucide="map-pin" class="w-5 h-5"></i> เปิดพิกัดบนแผนที่
                </a>` : '';

            const membersList = item.members.map((m, i) => `
                <div class="flex gap-3 text-sm text-gray-700 border-b border-gray-100 last:border-0 pb-2.5 last:pb-0">
                    <span class="text-gray-400 w-6 font-mono text-xs pt-0.5 text-right">${i + 1}.</span>
                    <span class="font-medium">${m}</span>
                </div>
            `).join('');

            modalContent.innerHTML = `
                <div class="bg-gradient-to-br from-purple-600 to-purple-800 p-6 text-white sticky top-0 z-10 rounded-t-2xl shadow-sm">
                    <button onclick="closeModal()" class="absolute top-4 right-4 p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors focus:outline-none backdrop-blur-sm">
                        <i data-lucide="x" class="w-5 h-5 text-white"></i>
                    </button>
                    <div class="flex items-center gap-2 text-purple-100 text-sm font-medium mb-2">
                        <span class="bg-white/20 px-2.5 py-1 rounded-md text-xs backdrop-blur-sm shadow-sm">แขวง${item.subDistrict}</span>
                        <span class="bg-white/10 px-2.5 py-1 rounded-md text-xs backdrop-blur-sm">หน่วยที่ ${item.unit}</span>
                    </div>
                    <h2 class="text-xl font-bold leading-tight mt-1 shadow-sm">${item.location}</h2>
                </div>
                <div class="p-6">
                    <div class="flex gap-4 items-start mb-8">
                        <div class="bg-purple-100 p-3.5 rounded-xl flex-shrink-0 shadow-sm border border-purple-200/50">
                            <i data-lucide="user" class="text-purple-600 w-6 h-6"></i>
                        </div>
                        <div class="pt-1">
                            <p class="text-sm text-purple-600/80 font-bold uppercase tracking-wide mb-0.5">ประธานหน่วย</p>
                            <p class="text-lg font-bold text-gray-900">${item.president}</p>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <i data-lucide="users" class="text-purple-400 w-4 h-4"></i>
                            <h3 class="font-semibold text-gray-700 uppercase text-sm tracking-wide">กรรมการประจำหน่วย (${item.members.length})</h3>
                        </div>
                        <div class="bg-gray-50 rounded-xl p-4 space-y-2 border border-gray-100">
                            ${membersList}
                        </div>
                    </div>
                    
                    ${policeSection}
                    ${mapButton}
                </div>
            `;

            modalBackdrop.classList.remove('hidden');
            setTimeout(() => {
                modalBackdrop.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
            
            lucide.createIcons();
        }

        function closeModal() {
            const modalBackdrop = document.getElementById('modalBackdrop');
            const modalContent = document.getElementById('modalContent');
            
            modalBackdrop.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modalBackdrop.classList.add('hidden');
            }, 200);
        }

        // --- Initialization ---
        window.onload = () => {
            allData = parseCSV(rawCSV);
            renderFilters();
            renderCards();

            // Event Listeners สำหรับการค้นหาและปุ่มกากบาท
            const searchInput = document.getElementById('searchInput');
            const clearSearchBtn = document.getElementById('clearSearchBtn');

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                if (searchQuery.length > 0) {
                    clearSearchBtn.classList.remove('hidden');
                } else {
                    clearSearchBtn.classList.add('hidden');
                }
                renderCards();
            });

            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchQuery = '';
                clearSearchBtn.classList.add('hidden');
                renderCards();
                searchInput.focus();
            });

            // ปิด Modal เมื่อคลิกพื้นที่ว่าง
            document.getElementById('modalBackdrop').addEventListener('click', (e) => {
                if (e.target.id === 'modalBackdrop') closeModal();
            });
        };
    </script>
</body>
</html>
