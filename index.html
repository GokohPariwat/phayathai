        // --- State Management ---
        let allData = [];
        let searchQuery = '';
        let selectedSubDistrict = 'ทั้งหมด';

        // --- Functions ---

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const columns = line.split(',');
                const unit = columns[0]?.trim();
                const subDistrict = columns[1]?.trim();
                const location = columns[2]?.trim();
                const president = columns[3]?.trim();
                const members = [];
                for (let j = 4; j <= 15; j++) {
                    if (columns[j] && columns[j].trim() !== '') {
                        members.push(columns[j].trim());
                    }
                }
                const police = columns[16]?.trim();
                const mapLink = columns[17]?.trim();
                if (unit) {
                    result.push({
                        id: `${subDistrict}-${unit}-${i}`,
                        unit,
                        subDistrict,
                        location,
                        president,
                        members,
                        police,
                        mapLink
                    });
                }
            }
            return result;
        }

        function highlightText(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="bg-yellow-200 font-semibold">$1</span>');
        }

        function renderFilters() {
            const subDistricts = ['ทั้งหมด', ...new Set(allData.map(d => d.subDistrict))];
            const container = document.getElementById('filterContainer');
            container.innerHTML = `<i data-lucide="filter" class="text-gray-400 flex-shrink-0 w-4 h-4 mr-2"></i>`;
            
            subDistricts.forEach(sd => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border ${
                    selectedSubDistrict === sd
                        ? 'bg-indigo-600 text-white border-indigo-600 shadow-md shadow-indigo-200'
                        : 'bg-white text-gray-600 border-gray-200 hover:border-indigo-300 hover:text-indigo-600'
                }`;
                btn.textContent = sd;
                btn.onclick = () => {
                    selectedSubDistrict = sd;
                    renderFilters(); // Re-render buttons to update active state
                    renderCards(); // Filter data
                };
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            const noResults = document.getElementById('noResults');
            const resultCount = document.getElementById('resultCount');
            
            const filtered = allData.filter(item => {
                const matchesSearch = 
                    item.location.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.president.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.members.some(m => m.toLowerCase().includes(searchQuery.toLowerCase())) ||
                    (item.police && item.police.toLowerCase().includes(searchQuery.toLowerCase())) ||
                    item.unit.toString().includes(searchQuery);
                
                const matchesFilter = selectedSubDistrict === 'ทั้งหมด' || item.subDistrict === selectedSubDistrict;
                return matchesSearch && matchesFilter;
            });

            resultCount.innerHTML = `พบข้อมูลจำนวน <span class="font-bold text-indigo-600">${filtered.length}</span> หน่วย`;

            if (filtered.length === 0) {
                container.innerHTML = '';
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                container.innerHTML = filtered.map(item => createCardHTML(item)).join('');
            }
            
            // Add click listeners for cards
            document.querySelectorAll('.card-item').forEach(card => {
                card.addEventListener('click', () => openModal(card.dataset.id));
            });

            lucide.createIcons();
        }

        function createCardHTML(item) {
            // Check matches for logic (simplified for HTML string, mostly handled by highlightText)
            const mapLinkHTML = (item.mapLink && item.mapLink.startsWith('http')) 
                ? `<a href="${item.mapLink}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()" class="flex items-center gap-1 text-xs font-medium text-gray-500 hover:text-indigo-600 transition-colors bg-white px-2 py-1 rounded-lg border border-gray-200"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> แผนที่</a>` 
                : '';

            const policeHTML = item.police ? `
                <div class="flex items-start gap-3 p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <div class="p-2 bg-white rounded-full shadow-sm flex-shrink-0">
                        <i data-lucide="shield" class="text-blue-600 w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-xs text-blue-500 font-bold uppercase">จนท.รักษาความปลอดภัย</p>
                        <p class="font-semibold text-gray-900">${highlightText(item.police, searchQuery)}</p>
                    </div>
                </div>` : '';

            const membersHTML = item.members.map((member, idx) => `
                <div class="flex items-center gap-2 text-sm text-gray-700 py-1 border-b border-gray-100 last:border-0 sm:border-0">
                    <span class="text-gray-400 font-mono text-xs w-5 flex-shrink-0">${idx + 1}.</span>
                    <span>${highlightText(member, searchQuery)}</span>
                </div>
            `).join('');

            return `
            <div data-id="${item.id}" class="card-item bg-white rounded-xl shadow-sm hover:shadow-md border border-gray-100 transition-all duration-300 cursor-pointer group overflow-hidden flex flex-col relative mb-2">
                <div class="p-5 border-b border-gray-100 bg-gray-50/50">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-2">
                        <div class="flex gap-2">
                            <span class="px-3 py-1 bg-indigo-600 text-white text-sm font-bold rounded-full shadow-sm">${item.subDistrict}</span>
                            <span class="px-3 py-1 bg-white border border-indigo-200 text-indigo-700 text-sm font-bold rounded-full">หน่วยที่ ${item.unit}</span>
                        </div>
                        ${mapLinkHTML}
                    </div>
                    <h3 class="font-bold text-gray-900 text-xl group-hover:text-indigo-700 transition-colors">${highlightText(item.location, searchQuery)}</h3>
                </div>
                <div class="p-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="flex items-start gap-3 p-3 bg-indigo-50 rounded-lg border border-indigo-100">
                            <div class="p-2 bg-white rounded-full shadow-sm flex-shrink-0">
                                <i data-lucide="user" class="text-indigo-600 w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-xs text-indigo-500 font-bold uppercase">ประธานหน่วย</p>
                                <p class="font-semibold text-gray-900">${highlightText(item.president, searchQuery)}</p>
                            </div>
                        </div>
                        ${policeHTML}
                    </div>
                    <div>
                        <h4 class="flex items-center gap-2 text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">
                            <i data-lucide="users" class="w-4 h-4"></i> รายชื่อกรรมการประจำหน่วย (${item.members.length})
                        </h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-4 gap-y-2">
                            ${membersHTML}
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function openModal(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;

            const modalBackdrop = document.getElementById('modalBackdrop');
            const modalContent = document.getElementById('modalContent');
            
            const policeSection = item.police ? `
                <div class="flex gap-4 items-center bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <div class="bg-white p-2 rounded-lg shadow-sm">
                        <i data-lucide="shield" class="text-blue-600 w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-xs text-blue-500 font-bold uppercase tracking-wide">เจ้าหน้าที่รักษาความปลอดภัย</p>
                        <p class="font-semibold text-gray-900">${item.police}</p>
                    </div>
                </div>` : '';

            const mapButton = (item.mapLink && item.mapLink.startsWith('http')) ? `
                <a href="${item.mapLink}" target="_blank" rel="noreferrer" class="flex items-center justify-center gap-2 w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors shadow-lg shadow-indigo-200 mt-6">
                    <i data-lucide="map-pin" class="w-4 h-4"></i> เปิดแผนที่นำทาง
                </a>` : '';

            const membersList = item.members.map((m, i) => `
                <div class="flex gap-3 text-sm text-gray-700 border-b border-gray-100 last:border-0 pb-2 last:pb-0">
                    <span class="text-gray-400 w-6 font-mono text-xs pt-0.5">${i + 1}.</span>
                    <span>${m}</span>
                </div>
            `).join('');

            modalContent.innerHTML = `
                <div class="bg-indigo-600 p-6 text-white sticky top-0 z-10 rounded-t-2xl">
                    <button onclick="closeModal()" class="absolute top-4 right-4 p-2 bg-white/20 hover:bg-white/30 rounded-full transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                    <div class="flex items-center gap-2 text-indigo-100 text-sm font-medium mb-1">
                        <span class="bg-white/20 px-2 py-0.5 rounded text-xs">${item.subDistrict}</span>
                        <span>หน่วยที่ ${item.unit}</span>
                    </div>
                    <h2 class="text-xl font-bold leading-tight">${item.location}</h2>
                </div>
                <div class="p-6 space-y-6">
                    <div class="flex gap-4 items-start">
                        <div class="bg-indigo-100 p-3 rounded-xl">
                            <i data-lucide="user" class="text-indigo-600 w-6 h-6"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500 font-medium">ประธานหน่วย</p>
                            <p class="text-lg font-bold text-gray-900">${item.president}</p>
                        </div>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <i data-lucide="users" class="text-gray-400 w-4 h-4"></i>
                            <h3 class="font-semibold text-gray-700">กรรมการประจำหน่วย (${item.members.length})</h3>
                        </div>
                        <div class="bg-gray-50 rounded-xl p-4 space-y-2 border border-gray-100">
                            ${membersList}
                        </div>
                    </div>
                    ${policeSection}
                    ${mapButton}
                </div>
            `;

            modalBackdrop.classList.remove('hidden');
            // Small delay to allow display:block to apply before opacity transition
            setTimeout(() => {
                modalBackdrop.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
            
            lucide.createIcons();
        }

        function closeModal() {
            const modalBackdrop = document.getElementById('modalBackdrop');
            const modalContent = document.getElementById('modalContent');
            
            modalBackdrop.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modalBackdrop.classList.add('hidden');
            }, 200);
        }

        // --- Initialization ---
        window.onload = () => {
            allData = parseCSV(rawCSV);
            renderFilters();
            renderCards();

            // Event Listeners
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderCards();
            });

            // Close modal on backdrop click
            document.getElementById('modalBackdrop').addEventListener('click', (e) => {
                if (e.target.id === 'modalBackdrop') closeModal();
            });
        };
    </script>
</body>
</html>
